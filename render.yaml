services:
  - type: web
    name: study-birds-api
    runtime: node
    repo: https://github.com/IslamOsman1/STUDY-BIRDS
    rootDir: server
    plan: starter
    region: oregon
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: UPLOAD_DIR
        value: /opt/render/project/src/uploads
